publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  jwt_decoder: 2.0.1
  image_picker: ^1.1.2
  http: ^1.2.2
  web_socket_channel: ^2.4.0
  google_sign_in: ^6.2.1
  socket_io_client: ^2.0.3+1
  firebase_core: ^3.15.0
  firebase_messaging: ^15.2.0

  flutter_web_plugins:
    sdk: flutter
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true